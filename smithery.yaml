# Smithery MCP Registry manifest
# https://smithery.ai

name: mcp-delightloop
displayName: Delightloop
description: >
  Manage Delightloop contacts, campaigns, and webhook subscriptions from any
  MCP-compatible AI assistant (Claude, Cursor, Windsurf, Continue, Cline, Zed).
version: 0.1.2
license: MIT
homepage: https://delightloop.ai
repository: https://github.com/labs-delightloop/mcp-delightloop
categories:
  - crm
  - marketing
  - gifting
  - automation

# Smithery connects to your deployed HTTP server
# Update this URL after deploying to Railway / Render / Fly
startCommand:
  type: http
  url: https://mcp-delightloop.makesamhappy.com

# Users configure their own API key in Smithery UI
# Smithery passes it as ?apiKey= when connecting to /sse
config:
  apiKey:
    type: string
    description: >
      Your Delightloop API key.
      Get it from Settings → API Keys in the Delightloop dashboard.
    required: true
    secret: true

# All tools this server exposes
tools:
  - name: recipient_get
    description: Get a recipient by ID — includes landingPageUrl and claimPageUrl
  - name: contact_create
    description: Create a new contact in Delightloop
  - name: contact_bulk_create
    description: Create multiple contacts at once
  - name: contact_get
    description: Retrieve a single contact by ID
  - name: contact_list
    description: List contacts with search and pagination (supports returnAll)
  - name: contact_update
    description: Update an existing contact
  - name: campaign_get
    description: Retrieve a single campaign by ID
  - name: campaign_list
    description: List campaigns — filter by status or name, supports returnAll
  - name: campaign_add_contacts
    description: Add one or more contacts to a live campaign
  - name: webhook_create
    description: Subscribe a URL to Delightloop events
  - name: webhook_get
    description: Retrieve a webhook subscription by ID
  - name: webhook_list
    description: List all webhook subscriptions
  - name: webhook_delete
    description: Delete a webhook subscription
